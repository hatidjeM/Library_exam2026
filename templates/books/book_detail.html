{% extends "base.html" %}
{% block content %}
<h1>{{ book.title }}</h1>
<p>Author: {{ book.author.name }}</p>
<p>Pages: {{ book.pages }}</p>
<p>Published: {{ book.published_year }}</p>
<a href="{% url 'book-edit' book.pk %}" class="btn btn-warning">Edit</a>
<a href="{% url 'book-delete' book.pk %}" class="btn btn-danger">Delete</a>
<a href="{% url 'book-list' %}" class="btn btn-secondary">Back</a>
{% endblock %}
